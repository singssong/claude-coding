<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소스 설정 - TrendLens</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:8px;">
          <span class="logo-icon">⚡</span>
          <span class="logo-text">TrendLens</span>
        </a>
      </div>
      <nav>
        <a href="/" class="nav-link">← 메인으로</a>
      </nav>
    </div>
  </header>

  <main class="settings-main">

    <!-- 수동 크롤링 -->
    <section class="settings-section">
      <h2 class="settings-section-title">데이터 수집</h2>
      <p class="settings-desc">버튼을 눌러 지금 바로 모든 소스에서 기사를 수집합니다. 기사 본문 수집 + AI 번역/요약 포함으로 1~3분 소요됩니다.</p>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button id="crawlNowBtn" class="btn-primary" onclick="runCrawl()">지금 수집 실행</button>
        <button class="btn-reset" onclick="resetArticles()">데이터 초기화</button>
      </div>
      <div id="crawlStatus" class="crawl-status" style="display:none"></div>
    </section>

    <!-- 소스 목록 -->
    <section class="settings-section">
      <h2 class="settings-section-title">크롤링 소스 관리</h2>
      <p class="settings-desc">기본 소스는 삭제할 수 없습니다. 관심 있는 기술 사이트를 추가해보세요.</p>

      <div id="sourceList" class="source-list">
        <!-- JS로 렌더링 -->
      </div>

      <!-- 소스 추가 -->
      <div class="add-source-form">
        <h3 class="form-title">소스 추가</h3>
        <div class="form-row">
          <input type="text" id="sourceName" placeholder="소스 이름 (예: Nvidia Blog)" class="form-input" />
          <input type="url" id="sourceUrl" placeholder="URL (예: https://blogs.nvidia.com)" class="form-input" />
          <button class="btn-primary" onclick="addSource()">추가</button>
        </div>
        <div id="addStatus" class="status-msg" style="display:none"></div>
      </div>
    </section>

  </main>

  <script src="/static/js/settings.js"></script>
</body>
</html>
