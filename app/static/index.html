<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TrendLens</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">TrendLens</span>
        <span class="logo-sub">AI 기술 트렌드</span>
      </div>
      <nav>
        <span class="profile-pill" id="profilePill" style="display:none"></span>
        <a href="/settings" class="nav-link">⚙️ 소스 설정</a>
      </nav>
    </div>
  </header>

  <main>

    <!-- 내러티브 브리핑 -->
    <section class="daily-summary-section">
      <div class="section-label">
        <span class="badge">BRIEFING</span>
        <span class="section-title">오늘의 브리핑</span>
        <span class="update-time" id="updateTime"></span>
      </div>
      <div class="daily-summary-box" id="dailySummary">
        <div class="skeleton-text"></div>
        <div class="skeleton-text short"></div>
        <div class="skeleton-text"></div>
      </div>
    </section>

    <!-- 오늘의 픽 (1-5위, 당신에게 포함) -->
    <section class="feed-section" id="picksSection" style="display:none">
      <div class="feed-header">
        <h2 class="feed-title">오늘의 픽</h2>
        <span class="feed-sub-label">당신에게 새로운 내용</span>
      </div>
      <div id="picksFeed" class="news-feed"></div>
    </section>

    <!-- 나머지 인기 기사 (6-10위) -->
    <section class="feed-section" id="remainingSection" style="display:none">
      <div class="feed-header" style="margin-top:32px">
        <h2 class="feed-title">나머지 인기 기사</h2>
        <span class="feed-count" id="remainingCount"></span>
      </div>
      <div id="remainingFeed" class="news-feed extra-feed"></div>
    </section>

    <div id="loadingIndicator" class="loading">
      <div class="spinner"></div>
      <span>기사 불러오는 중...</span>
    </div>

    <div id="emptyState" class="empty-state" style="display:none">
      <p>수집된 기사가 없습니다.</p>
      <a href="/settings" class="btn-primary">소스 설정 &amp; 수집 실행하기 →</a>
    </div>

  </main>

  <div id="tooltip" class="keyword-tooltip" style="display:none"></div>

  <script src="/static/js/main.js"></script>
</body>
</html>
